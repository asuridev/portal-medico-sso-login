parent=keycloak
import=common/keycloak

# Estilos: se conservan los del tema base (patternfly/login) y se agrega el branding
# neutro (css/styles.css) al final para que sobrescriba.
styles=web_modules/@patternfly/react-core/dist/styles/base.css web_modules/@patternfly/react-core/dist/styles/app.css node_modules/patternfly/dist/css/patternfly.min.css node_modules/patternfly/dist/css/patternfly-additions.min.css css/login.css css/styles.css

# JS propio (toggle contrasena + casillas OTP). Sin reloj en este tema.
scripts=js/script.js

# Idiomas soportados por el tema
locales=es,en
