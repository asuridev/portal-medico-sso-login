# Keycloak 18.0.2 en modo desarrollo para validar el tema portal-medicos-cardif.
# Se prioriza 18.0.2 por ser el equivalente upstream de Red Hat SSO 7.6, la version
# objetivo de produccion (ver CLAUDE.md). El tema se monta como volumen y la cache de
# temas/plantillas queda desactivada para iterar recargando el navegador sin reiniciar.
services:
  keycloak:
    image: quay.io/keycloak/keycloak:18.0.2
    container_name: keycloak-portal-medicos
    command: start-dev
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KC_HTTP_ENABLED: "true"
      KC_HOSTNAME_STRICT: "false"
      # Desactivar cache de temas para desarrollo
      KC_SPI_THEME_CACHE_THEMES: "false"
      KC_SPI_THEME_CACHE_TEMPLATES: "false"
      KC_SPI_THEME_STATIC_MAX_AGE: "-1"
    ports:
      - "8080:8080"
    volumes:
      - ./themes/portal-medicos-cardif:/opt/keycloak/themes/portal-medicos-cardif:ro
